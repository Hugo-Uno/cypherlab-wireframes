<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CypherLab Wireframes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 640px; width: 100%; padding: 40px 24px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #a5f3a6; }
  p.subtitle { font-size: 14px; color: #8b949e; margin-bottom: 32px; }
  .card-list { display: flex; flex-direction: column; gap: 12px; }
  a.card { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; text-decoration: none; color: #e6edf3; transition: border-color 0.2s, background 0.2s; }
  a.card:hover { border-color: #58a6ff; background: #1c2129; }
  .card-icon { font-size: 22px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #1f6feb22; border-radius: 8px; flex-shrink: 0; }
  .card-text { flex: 1; }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-desc { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .arrow { color: #8b949e; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
  <h1>CypherLab Wireframes</h1>
  <p class="subtitle">Select a wireframe to preview</p>
  <div class="card-list">
    <a class="card" href="trader-dashboard-wireframe.html">
      <div class="card-icon">&#x1F4CB;</div>
      <div class="card-text">
        <div class="card-title">Trader Dashboard</div>
        <div class="card-desc">Main dashboard with match list, stats &amp; activity</div>
      </div>
      <span class="arrow">&#x2192;</span>
    </a>
    <a class="card" href="market-activity-wireframe.html">
      <div class="card-icon">&#x1F4CA;</div>
      <div class="card-text">
        <div class="card-title">Market Activity</div>
        <div class="card-desc">Live market activity feed &amp; analytics</div>
      </div>
      <span class="arrow">&#x2192;</span>
    </a>
    <a class="card" href="trader-market-view-wireframe.html">
      <div class="card-icon">&#x1F3AF;</div>
      <div class="card-text">
        <div class="card-title">Trader Market View</div>
        <div class="card-desc">Detailed market view for traders</div>
      </div>
      <span class="arrow">&#x2192;</span>
    </a>
    <a class="card" href="wager-page-wireframe.html">
      <div class="card-icon">&#x1F3AB;</div>
      <div class="card-text">
        <div class="card-title">Wager Page</div>
        <div class="card-desc">Wager management &amp; wagering interface</div>
      </div>
      <span class="arrow">&#x2192;</span>
    </a>
  </div>
</div>
</body>
</html>
